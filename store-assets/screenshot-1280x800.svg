  <rect x="756" y="364" width="388" height="272" rx="16" fill="#ffffff" stroke="#dbe7e7"/>
  <text x="784" y="408" font-family="Segoe UI, Malgun Gothic, sans-serif" font-size="20" font-weight="700" fill="#0e2a28"><tspan fill="#0d9488" font-weight="800">Q1.</tspan> 대법원이 원심 판결을</text>
  <text x="784" y="438" font-family="Segoe UI, Malgun Gothic, sans-serif" font-size="20" font-weight="700" fill="#0e2a28">확정한 이유는 무엇인가?</text>

  <rect x="784" y="462" width="332" height="76" rx="9" fill="#f2faf8"/>
