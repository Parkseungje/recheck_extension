  <text x="98" y="336" font-family="Segoe UI, Malgun Gothic, sans-serif" font-size="25" fill="#3f5f5d">AI가 답 대신 질문·힌트를 던지고,</text>
  <text x="98" y="372" font-family="Segoe UI, Malgun Gothic, sans-serif" font-size="25" fill="#3f5f5d">원문 문단으로 돌아가 스스로 되짚게 한다.</text>

